name: Build & Release ClearNote

# Triggers on any tag push matching v* (e.g. v1.0, v1.2.3)
on:
  push:
    tags:
      - "v*"

  # Also lets you trigger a build manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build — ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # don't cancel other platforms if one fails
      matrix:
        include:

          # ── Windows x86-64 ─────────────────────────────────────────────────
          - os: windows-latest
            artifact_name: ClearNote.exe
            asset_name: ClearNote-Windows-x86_64.exe
            pyinstaller_args: --onefile --windowed --name ClearNote

          # ── macOS Apple Silicon (M-series, arm64) ──────────────────────────
          # macos-latest = macos-14 which runs on Apple Silicon runners
          - os: macos-latest
            artifact_name: ClearNote
            asset_name: ClearNote-macOS-arm64
            pyinstaller_args: --onefile --windowed --name ClearNote

          # ── macOS Intel (x86-64) ───────────────────────────────────────────
          # macos-13 is the last GitHub-hosted Intel macOS runner
          - os: macos-15-intel
            artifact_name: ClearNote
            asset_name: ClearNote-macOS-x86_64
            pyinstaller_args: --onefile --windowed --name ClearNote

          # ── Linux x86-64 ───────────────────────────────────────────────────
          - os: ubuntu-latest
            artifact_name: ClearNote
            asset_name: ClearNote-Linux-x86_64
            pyinstaller_args: --onefile --windowed --name ClearNote

    steps:
      # ── 1. Checkout source ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Install tkinter on Linux (not bundled with GH Actions Python) ──
      - name: Install tkinter (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk

      # ── 4. Install Python dependencies ────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install chardet pyinstaller

      # ── 5. Build the binary ───────────────────────────────────────────────
      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} clearnote.py

      # ── 6. Ad-hoc sign the binary (macOS only) ────────────────────────────
      #
      # Without an Apple Developer certificate, Gatekeeper blocks unsigned
      # binaries with "cannot be verified". Ad-hoc signing with "-" is free,
      # requires no account, and satisfies Gatekeeper on the local machine
      # so users only need to right-click → Open ONCE on first launch,
      # rather than getting a hard block.
      #
      # For a fully trusted build with no prompts at all, you would need:
      #   - Apple Developer Program membership ($99/yr)
      #   - codesign with your Developer ID certificate
      #   - notarytool submission to Apple's notarisation service
      # That can be added later — see the commented block at the bottom.
      #
      - name: Ad-hoc code sign (macOS only)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - "dist/${{ matrix.artifact_name }}"
          echo "✓ Ad-hoc signature applied"

      # ── 7. Verify the binary exists ───────────────────────────────────────
      - name: Verify build output
        shell: bash
        run: |
          ls -lh dist/
          test -f "dist/${{ matrix.artifact_name }}" && echo "✓ Binary found" || (echo "✗ Binary missing" && exit 1)

      # ── 8. Rename asset to include platform in filename ───────────────────
      - name: Rename artifact for release
        shell: bash
        run: |
          cp "dist/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

      # ── 9. Upload binary as workflow artifact (always available) ──────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 30

      # ── 10. Attach to GitHub Release (only on tag pushes) ─────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          name: ClearNote ${{ github.ref_name }}
          body: |
            ## ClearNote ${{ github.ref_name }}

            Lightweight cross-platform text editor — Notepad replacement.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `ClearNote-Windows-x86_64.exe` |
            | macOS (M1/M2/M3/M4) | `ClearNote-macOS-arm64` |
            | macOS (Intel) | `ClearNote-macOS-x86_64` |
            | Linux    | `ClearNote-Linux-x86_64` |

            ### First run on macOS
            Binaries are ad-hoc signed but not notarised (no Apple Developer certificate).
            On first launch macOS Gatekeeper will show a warning.

            **To open it:**
            1. Right-click (or Control-click) the binary
            2. Choose **Open**
            3. Click **Open** in the dialog

            You only need to do this once — macOS remembers the exception.

            Or remove the quarantine flag from Terminal:
            ```bash
            xattr -d com.apple.quarantine ClearNote-macOS-arm64
            # or for Intel:
            xattr -d com.apple.quarantine ClearNote-macOS-x86_64
            ```

            ### First run on Linux
            ```bash
            chmod +x ClearNote-Linux-x86_64
            ./ClearNote-Linux-x86_64
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


