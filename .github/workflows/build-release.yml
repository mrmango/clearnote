name: Build & Release ClearNote

# Triggers on any tag push matching v* (e.g. v1.0, v1.2.3)
on:
  push:
    tags:
      - "v*"

  # Also lets you trigger a build manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # don't cancel other platforms if one fails
      matrix:
        include:
          - os: windows-latest
            artifact_name: ClearNote.exe
            asset_name: ClearNote-Windows-x86_64.exe
            pyinstaller_args: --onefile --windowed --name ClearNote

          - os: macos-latest
            artifact_name: ClearNote
            asset_name: ClearNote-macOS-arm64
            pyinstaller_args: --onefile --windowed --name ClearNote

          - os: ubuntu-latest
            artifact_name: ClearNote
            asset_name: ClearNote-Linux-x86_64
            pyinstaller_args: --onefile --windowed --name ClearNote

    steps:
      # ── 1. Checkout source ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Install tkinter on Linux (not bundled with GH Actions Python) ──
      - name: Install tkinter (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk

      # ── 4. Install Python dependencies ────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install chardet pyinstaller

      # ── 5. Build the binary ───────────────────────────────────────────────
      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} clearnote.py

      # ── 6. Verify the binary exists ───────────────────────────────────────
      - name: Verify build output
        shell: bash
        run: |
          ls -lh dist/
          test -f "dist/${{ matrix.artifact_name }}" && echo "✓ Binary found" || (echo "✗ Binary missing" && exit 1)

      # ── 7. Upload binary as workflow artifact (always available) ──────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 30

      # ── 8. Attach to GitHub Release (only on tag pushes) ──────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
          name: ClearNote ${{ github.ref_name }}
          body: |
            ## ClearNote ${{ github.ref_name }}

            Cross-platform text editor — lightweight Notepad replacement.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `ClearNote-Windows-x86_64.exe` |
            | macOS    | `ClearNote-macOS-arm64` |
            | Linux    | `ClearNote-Linux-x86_64` |

            **macOS:** You may need to right-click → Open the first time (Gatekeeper).
            **Linux:** `chmod +x ClearNote-Linux-x86_64` before running.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
